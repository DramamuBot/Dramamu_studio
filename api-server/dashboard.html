<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dramamu Studio - Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-8">

    <div class="max-w-7xl mx-auto">
        <h1 class="text-4xl font-bold mb-2 text-red-500">🎬 Dramamu Studio</h1>
        <p class="text-gray-400 mb-8">Pilih drama buat di-render hari ini bre!</p>

        <div id="error-msg" class="bg-red-900/50 text-red-200 p-4 rounded-lg hidden font-mono text-sm mb-4 border border-red-700">
        </div>

        <div id="drama-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
            <p class="text-yellow-400 font-bold animate-pulse" id="loading">⏳ Lagi ngerampok data dari Dramabox... Sabar bre, tarikan pertama emang agak lama...</p>
        </div>
    </div>

    <script>
        async function fetchDrama() {
            const grid = document.getElementById('drama-grid');
            const loading = document.getElementById('loading');
            const errorMsg = document.getElementById('error-msg');

            try {
                // Nembak ke API lokal Hndoko
                const response = await fetch('/api/home');
                const result = await response.json();
                
                loading.style.display = 'none'; // Ilangin tulisan loading

                // Cek kalau beneran sukses dan datanya ada
                if(result.success && result.data && result.data.book) {
                    result.data.book.forEach(drama => {
                        const card = `
                            <div class="bg-gray-800 rounded-lg overflow-hidden shadow-lg border border-gray-700 hover:border-red-500 transition cursor-pointer">
                                <img src="${drama.cover}" alt="Cover" class="w-full h-64 object-cover">
                                <div class="p-4">
                                    <h3 class="font-bold text-sm truncate" title="${drama.name}">${drama.name}</h3>
                                    <p class="text-xs text-gray-400 mt-2">ID: <span class="text-white font-mono">${drama.id}</span></p>
                                    <p class="text-xs text-gray-400">Total Eps: ${drama.chapterCount}</p>
                                </div>
                            </div>
                        `;
                        grid.innerHTML += card;
                    });
                } else {
                    // Kalau server ngerespon tapi isinya error
                    errorMsg.innerHTML = `❌ <b>Server nolak bre:</b><br>${result.error?.message || JSON.stringify(result)}`;
                    errorMsg.classList.remove('hidden');
                }
            } catch (error) {
                loading.style.display = 'none';
                errorMsg.innerHTML = `💥 <b>Gagal Konek Total:</b><br>${error.message}<br><br>Coba cek terminal 'npm run dev' lu, ada tulisan merah ga?`;
                errorMsg.classList.remove('hidden');
            }
        }

        fetchDrama();
    </script>
</body>
</html>
